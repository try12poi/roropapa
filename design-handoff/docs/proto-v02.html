// ---------- canvas ----------
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
cx.imageSmoothingEnabled = true;
const W = cv.width, H = cv.height;
const BARR_Y = 596;            // barricade line
const STORE_Y = 616;           // store interior starts
const OBST = [
  {x: 92, y: 300, r: 36, type: 'car'},
  {x: 338, y: 176, r: 20, type: 'trash'}
];
function pushOut(e){
  for (const ob of OBST){
    const d = Math.hypot(e.x-ob.x, e.y-ob.y);
    if (d > 0 && d < ob.r + e.r){
      const a = Math.atan2(e.y-ob.y, e.x-ob.x);
      e.x = ob.x + Math.cos(a)*(ob.r+e.r);
      e.y = ob.y + Math.sin(a)*(ob.r+e.r);
    }
  }
}

function fit(){
  const s = Math.min(window.innerWidth/W, window.innerHeight/H);
  cv.style.width = (W*s)+'px'; cv.style.height = (H*s)+'px';
  document.getElementById('stage').style.width = (W*s)+'px';
  document.getElementById('stage').style.height = (H*s)+'px';
}
window.addEventListener('resize', fit); fit();

// ---------- state ----------
const NIGHT_LEN = 90;          // seconds per night
let state = 'title';
let day, kills, totalKills, night_t, player, zombies, gems, fx, barr, spawnAcc, lastTs;

function reset(){
  day = 1; totalKills = 0;
  startNight(true);
}
function startNight(fresh){
  kills = 0; night_t = 0; zombies = []; gems = []; fx = []; spawnAcc = 0;
  if (fresh){
    player = {
      x: W/2, y: 470, r: 13, hp: 100, maxhp: 100, speed: 138,
      face: 'front', flip: false, moving: false,
      dmg: 30, atkCd: 0.72, atkR: 62, cdLeft: 0,
      pickR: 46, xp: 0, lvl: 1, need: 6, hurtCd: 0,
      swingT: 0, swingDir: 0, lungeT: 0, painT: 0, stepAcc: 0
    };
    barr = { hp: 100, max: 100 };
  } else {
    barr.hp = Math.min(barr.max, barr.hp + 40);
    player.hp = Math.min(player.maxhp, player.hp + Math.round(player.maxhp*0.5));
    player.x = W/2; player.y = 470;
  }
}

// ---------- input ----------
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });
let joy = null; // {sx,sy,dx,dy}
cv.addEventListener('touchstart', e => {
  const t = e.changedTouches[0];
  joy = { id: t.identifier, sx: t.clientX, sy: t.clientY, dx: 0, dy: 0 };
  e.preventDefault();
}, {passive:false});
cv.addEventListener('touchmove', e => {
  if (!joy) return;
  for (const t of e.changedTouches){
    if (t.identifier === joy.id){
      joy.dx = t.clientX - joy.sx; joy.dy = t.clientY - joy.sy;
    }
  }
  e.preventDefault();
}, {passive:false});
const endTouch = e => {
  if (!joy) return;
  for (const t of e.changedTouches) if (t.identifier === joy.id) joy = null;
};
cv.addEventListener('touchend', endTouch);
cv.addEventListener('touchcancel', endTouch);

function inputVec(){
  let dx = 0, dy = 0;
  if (keys['w']||keys['arrowup']) dy -= 1;
  if (keys['s']||keys['arrowdown']) dy += 1;
  if (keys['a']||keys['arrowleft']) dx -= 1;
  if (keys['d']||keys['arrowright']) dx += 1;
  if (joy){
    const m = Math.hypot(joy.dx, joy.dy);
    if (m > 10){ dx = joy.dx/m; dy = joy.dy/m; }
  }
  const m = Math.hypot(dx,dy);
  if (m > 1){ dx/=m; dy/=m; }
  return [dx,dy];
}

// ---------- zombies ----------
function spawnZombie(){
  const side = Math.random();
  let x, y;
  if (side < 0.7){ x = 20+Math.random()*(W-40); y = -18; }
  else if (side < 0.85){ x = -16; y = 40+Math.random()*300; }
  else { x = W+16; y = 40+Math.random()*300; }
  const hp = 34 + day*9 + night_t*0.25;
  zombies.push({
    x, y, r: 12, hp, maxhp: hp,
    speed: 26 + Math.random()*14 + day*1.5,
    mode: Math.random() < 0.32 ? 'player' : 'barricade',
    tx: 30 + Math.random()*(W-60),
    gnaw: 0, hitCd: 0, bob: Math.random()*6.28
  });
}

// ---------- upgrades ----------
const POOL = [
  {t:'묵직한 빠루', d:'공격력 +25%', f:p=>p.dmg*=1.25},
  {t:'풀스윙 연습', d:'공격 속도 +18%', f:p=>p.atkCd*=0.85},
  {t:'긴 리치', d:'휘두르기 범위 +18%', f:p=>p.atkR*=1.18},
  {t:'런닝화 새 상품', d:'이동 속도 +12%', f:p=>p.speed*=1.12},
  {t:'구급 파우치', d:'최대 체력 +25, 전부 회복', f:p=>{p.maxhp+=25; p.hp=p.maxhp;}},
  {t:'응급 보수 작업', d:'바리케이드 +35 수리', f:p=>{barr.hp=Math.min(barr.max, barr.hp+35);}},
  {t:'포인트 카드', d:'아이템 자석 범위 +30%', f:p=>p.pickR*=1.3}
];
function showLevelUp(){
  state = 'levelup';
  const picks = [...POOL].sort(()=>Math.random()-0.5).slice(0,3);
  const box = document.getElementById('cards');
  box.innerHTML = '';
  picks.forEach(u=>{
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<b>${u.t}</b><span>${u.d}</span>`;
    el.onclick = ()=>{ u.f(player); document.getElementById('levelup').style.display='none'; state='play'; };
    box.appendChild(el);
  });
  document.getElementById('levelup').style.display='flex';
}

// ---------- update ----------
function update(dt){
  night_t += dt;
  // spawn: faster over the night and per day
  const interval = Math.max(0.28, 1.35 - night_t*0.008 - day*0.09);
  spawnAcc += dt;
  while (spawnAcc > interval){ spawnAcc -= interval; spawnZombie(); }

  // player move
  const [dx,dy] = inputVec();
  player.moving = (dx!==0||dy!==0);
  if (player.moving){
    player.x = Math.max(16, Math.min(W-16, player.x + dx*player.speed*dt));
    player.y = Math.max(70, Math.min(BARR_Y-18, player.y + dy*player.speed*dt));
    if (Math.abs(dx) > Math.abs(dy)){ player.face='side'; player.flip = dx>0; }
    else if (dy < 0) player.face='back';
    else player.face='front';
    player.stepAcc += dt;
    if (player.stepAcc > 0.17){
      player.stepAcc = 0;
      fx.push({type:'dust', x: player.x - dx*10 + (Math.random()*10-5), y: player.y+24, t: 0.4});
    }
  }
  pushOut(player);
  if (player.hurtCd>0) player.hurtCd-=dt;
  if (player.painT>0) player.painT-=dt;
  if (player.swingT>0) player.swingT-=dt;
  if (player.lungeT>0) player.lungeT-=dt;

  // auto attack (crowbar swing)
  player.cdLeft -= dt;
  if (player.cdLeft <= 0){
    let hitAny = false, nd = 1e9, ndir = 0;
    for (const z of zombies){
      const d = Math.hypot(z.x-player.x, z.y-player.y);
      if (d < player.atkR + z.r){
        z.hp -= player.dmg; hitAny = true;
        const a = Math.atan2(z.y-player.y, z.x-player.x);
        z.x += Math.cos(a)*12; z.y += Math.sin(a)*12;
        if (d < nd){ nd = d; ndir = a; }
      }
    }
    if (hitAny){
      player.cdLeft = player.atkCd;
      player.swingT = 0.22; player.swingDir = ndir; player.lungeT = 0.15;
      fx.push({type:'swing', x:player.x, y:player.y, r:player.atkR, dir:ndir, t:0.22});
    } else player.cdLeft = 0.08;
  }

  // zombies
  for (let i=zombies.length-1; i>=0; i--){
    const z = zombies[i];
    z.bob += dt*6;
    if (z.hitCd>0) z.hitCd-=dt;
    let tx, ty;
    if (z.mode==='player'){ tx=player.x; ty=player.y; }
    else { tx=z.tx; ty=BARR_Y-8; }
    const d = Math.hypot(tx-z.x, ty-z.y);
    if (z.mode==='barricade' && d < 6){
      barr.hp -= 3.2*dt; // gnawing
    } else if (d > 2){
      const lur = 0.45 + Math.abs(Math.sin(z.bob*1.35)); // lurching gait
      z.x += (tx-z.x)/d * z.speed*lur*dt;
      z.y += (ty-z.y)/d * z.speed*lur*dt;
    }
    pushOut(z);
    // touch player
    const pd = Math.hypot(z.x-player.x, z.y-player.y);
    if (pd < z.r+player.r && z.hitCd<=0){
      z.hitCd = 0.8;
      if (player.hurtCd<=0){
        player.hp -= 8; player.hurtCd = 0.35; player.painT = 0.55;
        const ka = Math.atan2(player.y-z.y, player.x-z.x);
        player.x = Math.max(16, Math.min(W-16, player.x + Math.cos(ka)*16));
        player.y = Math.max(70, Math.min(BARR_Y-18, player.y + Math.sin(ka)*16));
        fx.push({type:'hurt', t:0.25});
      }
    }
    // death
    if (z.hp <= 0){
      kills++; totalKills++;
      gems.push({x:z.x, y:z.y, t:0});
      fx.push({type:'pop', x:z.x, y:z.y, t:0.3});
      zombies.splice(i,1);
    }
  }

  // gems
  for (let i=gems.length-1; i>=0; i--){
    const g = gems[i];
    const d = Math.hypot(g.x-player.x, g.y-player.y);
    if (d < player.pickR){
      g.x += (player.x-g.x)*10*dt; g.y += (player.y-g.y)*10*dt;
    }
    if (d < 14){
      gems.splice(i,1);
      player.xp++;
      if (player.xp >= player.need){
        player.xp = 0; player.lvl++;
        player.need = 5 + player.lvl*3;
        showLevelUp();
      }
    }
  }

  // fx
  for (let i=fx.length-1; i>=0; i--){ fx[i].t -= dt; if (fx[i].t<=0) fx.splice(i,1); }

  // end conditions
  if (barr.hp <= 0){ barr.hp = 0; return gameOver('바리케이드 붕괴'); }
  if (player.hp <= 0){ player.hp = 0; return gameOver('서연이 쓰러졌다'); }
  if (night_t >= NIGHT_LEN) return morning();
}

function morning(){
  state = 'morning';
  day++;
  document.getElementById('mDday').textContent = 'D+'+day;
  document.getElementById('mStats').textContent =
    `오늘 밤 처치 ${kills} · 누적 ${totalKills} · Lv.${player.lvl}`;
  document.getElementById('morning').classList.remove('hidden');
}
function gameOver(title){
  state = 'over';
  document.getElementById('oDday').textContent = 'D+'+day;
  document.getElementById('oTitle').textContent = title;
  document.getElementById('oStats').textContent =
    `${day}일 밤까지 생존 · 누적 처치 ${totalKills} · Lv.${player.lvl}`;
  document.getElementById('over').classList.remove('hidden');
}

// ---------- render ----------
function clockStr(){
  const total = 3*3600 * (night_t/NIGHT_LEN); // 03:00 -> 06:00
  const h = 3 + Math.floor(total/3600);
  const m = Math.floor((total%3600)/60);
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

function render(){
  // street
  cx.fillStyle = '#0A0E17';
  cx.fillRect(0,0,W,H);
  // road markings
  cx.strokeStyle = '#151E30'; cx.lineWidth = 3; cx.setLineDash([16,18]);
  cx.beginPath(); cx.moveTo(W/2, 0); cx.lineTo(W/2, BARR_Y-30); cx.stroke();
  cx.setLineDash([]);
  // crosswalk (top)
  cx.fillStyle = '#141D30';
  for (let x=24; x<W-24; x+=54) cx.fillRect(x, 66, 36, 24);
  // curbs
  cx.fillStyle = '#131C2D';
  cx.fillRect(0, 58, 9, BARR_Y-66); cx.fillRect(W-9, 58, 9, BARR_Y-66);
  // manholes
  cx.fillStyle = '#111927';
  cx.beginPath(); cx.ellipse(200,220,16,9,0,0,6.29); cx.fill();
  cx.beginPath(); cx.ellipse(300,420,16,9,0,0,6.29); cx.fill();
  // abandoned car (obstacle 1)
  const car = OBST[0];
  cx.save(); cx.translate(car.x, car.y); cx.rotate(-0.14);
  cx.fillStyle='rgba(0,0,0,0.3)';
  cx.beginPath(); cx.ellipse(0, 20, 36, 8, 0, 0, 6.29); cx.fill();
  cx.fillStyle='#182136'; cx.strokeStyle='#2A3550'; cx.lineWidth=2;
  cx.beginPath(); cx.roundRect(-34,-20,68,40,9); cx.fill(); cx.stroke();
  cx.fillStyle='#0C1220';
  cx.beginPath(); cx.roundRect(-22,-13,44,12,4); cx.fill();
  cx.fillStyle='#0F1626';
  cx.fillRect(-38,-14,5,10); cx.fillRect(-38,6,5,10);
  cx.fillRect(33,-14,5,10); cx.fillRect(33,6,5,10);
  cx.fillStyle='rgba(255,194,75,0.7)';
  cx.beginPath(); cx.arc(-30,14,2.5,0,6.29); cx.fill();
  cx.strokeStyle='#3E4F6E'; cx.lineWidth=1.2;
  cx.beginPath(); cx.moveTo(-10,-2); cx.lineTo(2,6); cx.lineTo(-4,12); cx.stroke();
  cx.restore();
  // trash pile (obstacle 2)
  const tr = OBST[1];
  cx.fillStyle='rgba(0,0,0,0.3)';
  cx.beginPath(); cx.ellipse(tr.x, tr.y+12, 24, 6, 0, 0, 6.29); cx.fill();
  cx.fillStyle='#10182A'; cx.strokeStyle='#26314B'; cx.lineWidth=2;
  cx.beginPath(); cx.arc(tr.x-9, tr.y+2, 11, 0, 6.29); cx.fill(); cx.stroke();
  cx.beginPath(); cx.arc(tr.x+8, tr.y+4, 9, 0, 6.29); cx.fill(); cx.stroke();
  cx.beginPath(); cx.arc(tr.x+1, tr.y-8, 8, 0, 6.29); cx.fill(); cx.stroke();
  cx.strokeStyle='#3E4F6E';
  cx.beginPath(); cx.moveTo(tr.x+1, tr.y-15); cx.lineTo(tr.x-2, tr.y-20); cx.stroke();
  cx.beginPath(); cx.moveTo(tr.x+1, tr.y-15); cx.lineTo(tr.x+5, tr.y-20); cx.stroke();

  // store warm glow above barricade
  const gr = cx.createLinearGradient(0, BARR_Y-130, 0, BARR_Y);
  gr.addColorStop(0, 'rgba(255,233,184,0)');
  gr.addColorStop(1, 'rgba(255,233,184,0.13)');
  cx.fillStyle = gr; cx.fillRect(0, BARR_Y-130, W, 130);

  // store interior
  cx.fillStyle = '#1a1408';
  cx.fillRect(0, BARR_Y, W, H-BARR_Y);
  cx.fillStyle = 'rgba(255,233,184,0.16)';
  cx.fillRect(0, STORE_Y, W, H-STORE_Y);
  // shelves silhouette
  cx.fillStyle = 'rgba(255,220,150,0.13)';
  for (let i=0;i<4;i++) cx.fillRect(28+i*100, STORE_Y+38, 64, 46);
  // sign
  cx.fillStyle = '#0E2A30';
  cx.fillRect(W/2-86, STORE_Y+6, 172, 26);
  cx.font = '900 17px "Apple SD Gothic Neo",sans-serif';
  cx.textAlign = 'center';
  cx.fillStyle = '#7FE3F0';
  cx.fillText('안심', W/2-18, STORE_Y+25);
  cx.fillStyle = '#FFC24B';
  cx.fillText('24', W/2+22, STORE_Y+25);

  // barricade
  const dmg = barr.hp/barr.max;
  for (let x=0; x<W; x+=42){
    cx.fillStyle = `rgba(201,169,106,${0.35+0.65*dmg})`;
    cx.fillRect(x+2, BARR_Y-8, 38, 16);
    cx.strokeStyle = 'rgba(90,70,35,'+(0.4+0.6*dmg)+')';
    cx.lineWidth = 2;
    cx.strokeRect(x+2, BARR_Y-8, 38, 16);
  }
  if (dmg < 0.5){
    cx.strokeStyle = 'rgba(255,90,90,0.55)'; cx.lineWidth = 1.5;
    for (let x=20; x<W; x+=80){
      cx.beginPath(); cx.moveTo(x, BARR_Y-8); cx.lineTo(x+12, BARR_Y+8); cx.stroke();
    }
  }

  // gems
  for (const g of gems){
    cx.save(); cx.translate(g.x, g.y); cx.rotate(0.785);
    cx.fillStyle = '#7FE3F0';
    cx.shadowColor = '#7FE3F0'; cx.shadowBlur = 8;
    cx.fillRect(-4,-4,8,8);
    cx.restore();
  }

  // zombies — hunched shamblers
  for (const z of zombies){
    const bob = Math.sin(z.bob)*2;
    const tilt = Math.sin(z.bob*0.7)*0.14;
    const jit = (Math.random() < 0.03) ? (Math.random()*4-2) : 0;
    cx.fillStyle = 'rgba(0,0,0,0.4)';
    cx.beginPath(); cx.ellipse(z.x, z.y+z.r+6, z.r*1.1, 4.5, 0, 0, 6.29); cx.fill();
    cx.save();
    cx.translate(z.x + jit, z.y + bob);
    cx.rotate(tilt);
    // long reaching arms with claws
    cx.strokeStyle = '#20293F'; cx.lineWidth = 4; cx.lineCap = 'round';
    const rch = Math.sin(z.bob*1.35)*3;
    cx.beginPath(); cx.moveTo(-8,-2); cx.lineTo(-15, 10+rch); cx.stroke();
    cx.beginPath(); cx.moveTo(8,-2); cx.lineTo(16, 12-rch); cx.stroke();
    cx.strokeStyle = '#2E3A57'; cx.lineWidth = 1.6;
    for (let c=-1;c<=1;c++){
      cx.beginPath(); cx.moveTo(-15, 10+rch); cx.lineTo(-15+c*3, 16+rch); cx.stroke();
      cx.beginPath(); cx.moveTo(16, 12-rch); cx.lineTo(16+c*3, 18-rch); cx.stroke();
    }
    // torso with torn jagged hem
    cx.fillStyle = '#161D2E'; cx.strokeStyle = '#2A3550'; cx.lineWidth = 2;
    cx.beginPath();
    cx.moveTo(-9,-5); cx.lineTo(9,-5); cx.lineTo(11,8);
    cx.lineTo(7,6); cx.lineTo(4,13); cx.lineTo(0,8); cx.lineTo(-4,14); cx.lineTo(-8,7); cx.lineTo(-11,9);
    cx.closePath(); cx.fill(); cx.stroke();
    // tilted head
    cx.fillStyle = '#1B2436'; cx.strokeStyle = '#2E3A57';
    cx.save(); cx.translate(3,-13); cx.rotate(0.22);
    cx.beginPath(); cx.arc(0, 0, 8.5, 0, 6.29); cx.fill(); cx.stroke();
    // sunken sockets
    cx.fillStyle = '#0A0E17';
    cx.beginPath(); cx.ellipse(-3.5,-1, 3, 3.6, 0, 0, 6.29); cx.fill();
    cx.beginPath(); cx.ellipse(3.5,-0.5, 2.6, 3.2, 0, 0, 6.29); cx.fill();
    // uneven glowing eyes
    cx.fillStyle = '#FF5A5A'; cx.shadowColor = '#FF5A5A'; cx.shadowBlur = 8;
    cx.beginPath(); cx.arc(-3.5, -1, 2.2, 0, 6.29); cx.fill();
    cx.beginPath(); cx.arc(3.5, -0.5, 1.3, 0, 6.29); cx.fill();
    cx.shadowBlur = 0;
    // gaping jagged mouth
    cx.fillStyle = '#07090F';
    cx.beginPath();
    cx.moveTo(-3.5,4); cx.lineTo(-1.5,6.5); cx.lineTo(0,4.5); cx.lineTo(1.8,7); cx.lineTo(3.5,4.5);
    cx.lineTo(3,8.5); cx.lineTo(-3,8); cx.closePath(); cx.fill();
    cx.restore();
    cx.restore();
    // hp sliver
    if (z.hp < z.maxhp){
      cx.fillStyle = '#20293D'; cx.fillRect(z.x-10, z.y-z.r-12, 20, 3);
      cx.fillStyle = '#FF5A5A'; cx.fillRect(z.x-10, z.y-z.r-12, 20*(z.hp/z.maxhp), 3);
    }
  }

  // fx
  for (const f of fx){
    if (f.type==='swing'){
      const k = f.t/0.22;
      cx.strokeStyle = `rgba(127,227,240,${k})`;
      cx.lineWidth = 6; cx.lineCap = 'round';
      cx.beginPath(); cx.arc(f.x, f.y, f.r, f.dir-1.15, f.dir+1.15); cx.stroke();
      cx.strokeStyle = `rgba(127,227,240,${k*0.4})`;
      cx.lineWidth = 12;
      cx.beginPath(); cx.arc(f.x, f.y, f.r-8, f.dir-0.9, f.dir+0.9); cx.stroke();
    } else if (f.type==='dust'){
      cx.fillStyle = `rgba(140,160,179,${f.t/0.4*0.45})`;
      cx.beginPath(); cx.arc(f.x, f.y, (0.4-f.t)*16+2, 0, 6.29); cx.fill();
    } else if (f.type==='pop'){
      cx.fillStyle = `rgba(140,160,179,${f.t/0.3})`;
      for (let i=0;i<5;i++){
        const a = i*1.26, rr = (0.3-f.t)*40;
        cx.fillRect(f.x+Math.cos(a)*rr-2, f.y+Math.sin(a)*rr-2, 4, 4);
      }
    }
  }

  // player sprite (animated)
  const img = SPR[player.face] || SPR.front;
  if (img && img.complete && img.naturalWidth){
    const now = performance.now()/1000;
    let hop = 0, rot = 0, sy = 1;
    if (player.moving){
      const ph = now*11;
      hop = -Math.abs(Math.sin(ph))*5;
      rot = Math.sin(ph)*0.07;
      sy  = 1 + Math.sin(ph*2)*0.045;
    } else {
      sy = 1 + Math.sin(now*2.4)*0.018;  // idle breathing
    }
    let ox = 0, oy = 0;
    if (player.lungeT > 0){
      const k = player.lungeT/0.15;
      ox = Math.cos(player.swingDir)*9*k;
      oy = Math.sin(player.swingDir)*9*k;
    }
    const hpx = 62, wpx = hpx*img.naturalWidth/img.naturalHeight;
    cx.fillStyle = 'rgba(0,0,0,0.35)';
    cx.beginPath(); cx.ellipse(player.x, player.y+26, 15+hop*0.7, 5, 0, 0, 6.29); cx.fill();
    cx.save();
    cx.translate(player.x+ox, player.y+oy+hop);
    cx.rotate((player.face==='side' && player.flip) ? -rot : rot);
    if (player.face==='side' && player.flip) cx.scale(-1,1);
    cx.scale(1, sy);
    if (player.hurtCd>0 && Math.floor(player.hurtCd*20)%2===0) cx.globalAlpha = 0.45;
    cx.drawImage(img, -wpx/2, -hpx/2 - 8, wpx, hpx);
    cx.restore();
    // crowbar swing animation
    if (player.swingT > 0){
      const k = 1 - player.swingT/0.22;             // 0 -> 1 sweep
      const a = player.swingDir - 1.5 + k*2.7;
      cx.save();
      cx.translate(player.x+ox, player.y+oy+hop-6);
      cx.rotate(a);
      cx.strokeStyle = '#454F66'; cx.lineWidth = 5; cx.lineCap = 'round';
      cx.beginPath(); cx.moveTo(10,0); cx.lineTo(42,0); cx.stroke();
      cx.strokeStyle = '#6A7590'; cx.lineWidth = 3.4;
      cx.beginPath(); cx.arc(42, -4.5, 5.5, 1.3, 3.7); cx.stroke();
      cx.restore();
    }
    // pain reaction bubble
    if (player.painT > 0){
      const k = player.painT/0.55;
      cx.save();
      cx.globalAlpha = Math.min(1, k*1.7);
      cx.translate(player.x+18, player.y-46 - (1-k)*8);
      cx.fillStyle = '#FFF3D6'; cx.strokeStyle = '#FF5A5A'; cx.lineWidth = 2;
      cx.beginPath();
      for (let i=0;i<10;i++){
        const a0 = i/10*6.283, r0 = (i%2 ? 10 : 16);
        cx.lineTo(Math.cos(a0)*r0, Math.sin(a0)*r0);
      }
      cx.closePath(); cx.fill(); cx.stroke();
      cx.fillStyle = '#FF5A5A'; cx.font = '900 11px "Apple SD Gothic Neo",sans-serif';
      cx.textAlign = 'center';
      cx.fillText('아야!', 0, 4);
      cx.restore();
    }
  }

  // fog drift
  const t = performance.now()/1000;
  cx.fillStyle = 'rgba(62,79,110,0.08)';
  for (let i=0;i<3;i++){
    const fx0 = (t*12 + i*160) % (W+160) - 80;
    cx.beginPath(); cx.ellipse(fx0, 120+i*140, 90, 22, 0, 0, 6.29); cx.fill();
  }

  // hurt vignette
  const hurt = fx.find(f=>f.type==='hurt');
  if (hurt){
    cx.strokeStyle = `rgba(255,90,90,${hurt.t/0.25*0.6})`;
    cx.lineWidth = 10; cx.strokeRect(5,5,W-10,H-10);
  }

  // ---------- HUD ----------
  cx.fillStyle = 'rgba(10,14,23,0.75)';
  cx.fillRect(0,0,W,58);
  cx.font = '700 20px ui-monospace,Menlo,monospace';
  cx.fillStyle = '#FF5A5A'; cx.textAlign='center';
  cx.shadowColor='#FF5A5A'; cx.shadowBlur=10;
  cx.fillText(clockStr(), W/2, 28);
  cx.shadowBlur=0;
  cx.font = '700 13px ui-monospace,monospace';
  cx.fillStyle = '#FFC24B'; cx.textAlign='left';
  cx.fillText('D+'+day, 12, 22);
  cx.fillStyle = '#8CA0B3';
  cx.fillText('Lv.'+player.lvl, 12, 40);
  cx.textAlign='right';
  cx.fillText('처치 '+totalKills, W-12, 22);

  // HP bar
  cx.fillStyle='#20293D'; cx.fillRect(12, 46, 160, 7);
  cx.fillStyle='#7ED8A8'; cx.fillRect(12, 46, 160*Math.max(0,player.hp/player.maxhp), 7);
  // barricade bar
  cx.fillStyle='#20293D'; cx.fillRect(W-172, 46, 160, 7);
  cx.fillStyle='#FFC24B'; cx.fillRect(W-172, 46, 160*Math.max(0,barr.hp/barr.max), 7);
  cx.font='10px ui-monospace,monospace'; cx.fillStyle='#8CA0B3';
  cx.textAlign='left'; cx.fillText('HP', 12, 43);
  cx.textAlign='right'; cx.fillText('바리케이드', W-12, 43);

  // XP bar (bottom)
  cx.fillStyle='#20293D'; cx.fillRect(0, H-5, W, 5);
  cx.fillStyle='#7FE3F0'; cx.fillRect(0, H-5, W*(player.xp/player.need), 5);
}

// ---------- loop ----------
function loop(ts){
  if (lastTs === undefined) lastTs = ts;
  let dt = (ts - lastTs)/1000; lastTs = ts;
  if (dt > 0.05) dt = 0.05;
  if (state === 'play') update(dt);
  if (state === 'play' || state === 'levelup') render();
  requestAnimationFrame(loop);
}

// ---------- buttons ----------
document.getElementById('btnStart').onclick = ()=>{
  document.getElementById('title').classList.add('hidden');
  reset(); state = 'play';
};
document.getElementById('btnNext').onclick = ()=>{
  document.getElementById('morning').classList.add('hidden');
  startNight(false); state = 'play';
};
document.getElementById('btnRetry').onclick = ()=>{
  document.getElementById('over').classList.add('hidden');
  reset(); state = 'play';
};

requestAnimationFrame(loop);
</script>
